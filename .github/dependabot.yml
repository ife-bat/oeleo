version: 2
updates:
  - package-ecosystem: uv
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    # uv groups do not support dependency-type; use patterns (first match wins).
    groups:
      dev-tools:
        patterns:
          - "black"
          - "isort"
          - "pytest"
          - "nox"
          - "auto-py-to-exe"
      all-dependencies:
        patterns:
          - "*"

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    groups:
      github-actions:
        patterns:
          - "*"
